{{ define "main" }}

<article>
    <h1>{{ .Title }}</h1>

    {{ if .Params.author }}
        <p><em>By: {{ .Params.author }}</em></p>
    {{ end }}

    {{ if .Params.toc }}
        <aside {{ if .Params.tocBorder }} class="toc" {{ end }}>
            {{ .TableOfContents }}
        </aside>
    {{ end }}

    {{ .Content }}
</article>
{{ end }}
